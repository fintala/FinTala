<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="hsl(0, 0%, 96%)" />
  <title>FinTala | Charts</title>

  <!-- Charts-specific CSS -->
  <link rel="stylesheet" href="css/charts.css" />
</head>

<body>
  <!-- SPLASH SCREEN -->
  <div id="chart-loadScreen">
    <img src="assets/public-imgz/bull-vs-bear-vector.jpg" alt="bulls n' bears" />
    <span id="cl-span"></span>
  </div>
  
  <!-- MAIN APP -->
  <div id="app">
    <svg id="chart"></svg>
    
    <!-- Overlay Curtain -->
    <div id="chartOverlay">
      <div id="co-wrap">
        <div id="drawWrap" class="overlay-choice">
          <h3>drawing tools</h3>
          <div id="trendline">
            <h4><img src="assets/ui/3-trend-line.png" alt="trend-line">Trendline</h4>
          </div>
          <div id="hol-line">
            <h4><img src="assets/ui/3-trend-line.png" alt="hol-line">Horizontal Line</h4>
          </div>
        </div>
        <div id="indicatorWrap" class="overlay-choice">
          <h3>Indicators</h3>
          <div id="volume">
            <h4><img src="assets/ui/volume-level-indicator.svg" alt="rsi" />Volume</h4>
          </div>
          <div id="movingAverage">
            <h4><img style="transform: scale(1.3);" src="assets/ui/MAvg.jpg" alt="MAvg">Moving Average</h4>
          </div>
          <div id="rsi">
            <h4><img src="assets/ui/RSI.png" alt="rsi"/>Relative Strength Index</h4>
          </div>
              
        </div>
      </div>
    </div>
    <!-- moving averages -->
    <div id="ma-block">
      <div id="ma-wrap">
        <div class="ma-head">
          <span id="ma-close">×</span>
          <span id="ma-edit">+</span>
          <span class="ma-title">moving averages</span>
        </div>
      </div>
    </div>
    <div id="action-card">
      <div id="actioncard-wrap"></div>
    </div>
    <div id="ma-inputs"></div>
    
    <!-- trendlines -->
    <div id="tl-block">
      <div id="tl-wrap">
        <div class="tl-head">
          <span id="tl-close">×</span>
          <span id="tl-edit">+</span>
          <span class="tl-title">trendlines</span>
        </div>
      </div>
    </div>
    <div id="tlaction-card">
      <div id="tlactioncard-wrap"></div>
    </div>
    <div id="tlcomposer"></div>
    
    <!-- horizontal lines -->
    <div id="hl-block">
      <div id="hl-wrap">
        <div class="hl-head">
          <span id="hl-close">×</span>
          <span id="hl-edit">+</span>
          <span class="hl-title">horizontal lines</span>
        </div>
      </div>
    </div>
    <div id="hlaction-card">
      <div id="hlactioncard-wrap"></div>
    </div>
    <div id="hlcomposer"></div>
    
    <div id="alert-card">
      <div class="alert-card">
        <h3>v0.2.7 says:</h3>
        <p id="alert"></p>
      </div>
      <span id="close-alert">Ok</span>
    </div>
        
    <div id="logo"><img id="chart-logo" src="assets/brand/FinTala negative.png" alt="FinTala logo"></div>
    <div class="chart-navigation">
      <div class="chartnav-wrap">
        <button id="graph" class="">
          <img id="graphA" src="assets/ui/chart-line-smooth.svg" alt="linegraph">
          <img id="graphB" src="assets/ui/chart_candle.png" alt="chart_candle">
        </button>
        <button id="drawingTools" class="drawing-tools">
          <img src="assets/ui/drawing.png" alt="drawings">
        </button>
        <button id="tIndicators" class="indicators">
          <img src="assets/ui/signal.svg" alt="Indicators">
        </button>
        <button id="chartSettings" class="chart-settings tButton">
          <img src="assets/ui/settings-cog.svg" alt="settings">
        </button>
        <button id="tfwa" class="chart-timeline"><span>D1</span></button>
        <button id="tfwb" class="chart-timeline"><span>W1</span></button>
        <button id="tfwc" class="chart-timeline"><span>M1</span></button>
        <button id="tfwd" class="chart-timeline"><span>Y1</span></button>
      </div>
    </div>
    <div class="chart-key">
      <div class="chartkey-wrap">
        <div id="chart-title">-------</div>
        <div id="date-key">2000 / 2000</div>
      </div>
    </div>
  </div>
  
  <script type="text/javascript" src="cdn_modules/d3@7.9.0/d3.min.js"></script>
  <script src="js/splash/splash.js"></script>
  <script src="js/chart/chart.js"></script>
  <script src="js/chart/charting_tools/drawings.js"></script>
  <script src="js/chart/charting_tools/shapes.js"></script>
  <script src="js/chart/timeline+-.js"></script>
  

</body>

</html>
